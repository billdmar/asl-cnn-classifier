# Pre-commit hooks that mirror the CI gate EXACTLY (ruff + black + mypy on
# src/tests). Uses repo-local hooks that call the project's own .venv binaries,
# so hook behavior can never drift from what CI runs (CI invokes the same
# .venv tools). Install once with `make install-hooks`.
#
# This exists because a round of commits passed local `ruff` but failed CI's
# `black --check` — pre-commit makes that class of red-CI impossible.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, src+tests)
        entry: .venv/bin/ruff check src tests
        language: system
        pass_filenames: false
        types: [python]
      - id: black
        name: black (format check, src+tests)
        entry: .venv/bin/black --check src tests
        language: system
        pass_filenames: false
        types: [python]
      - id: mypy
        name: mypy (type check, src)
        entry: .venv/bin/mypy src
        language: system
        pass_filenames: false
        types: [python]
