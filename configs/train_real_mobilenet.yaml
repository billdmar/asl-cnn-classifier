# Training configuration — MobileNetV2 transfer-learning fine-tune on the REAL
# ASL hand-sign dataset (Marxulia/asl_sign_languages_alphabets_v03 from the HF
# Hub, 26 classes A-Z, ~10.9k images). Download it first with `make download-real`.
#
# Transfer learning (pretrained ImageNet backbone) is used because the
# from-scratch CustomCNN stalls at chance on this data; freezing the backbone for
# a warm-up then fine-tuning at a 10x-lower LR converges reliably. CLI flags
# override any value here.

# Data
data_dir: data/asl_real
image_size: 128
train_frac: 0.70
val_frac: 0.15
test_frac: 0.15

# Model
arch: mobilenet_v2
num_classes: 26           # A-Z (this dataset has no del/nothing/space)
pretrained: true

# Optimization
batch_size: 64
num_epochs: 12
learning_rate: 0.001      # head LR during warm-up
weight_decay: 0.0001
optimizer: adamw
lr_scheduler: cosine
warmup_epochs: 3          # epochs with frozen backbone before fine-tuning

# Training behavior
seed: 42
num_workers: 4
amp: false                # auto-disabled on non-CUDA devices
early_stopping_patience: 5
device: auto

# Output
checkpoint_dir: artifacts/checkpoints
tensorboard_dir: artifacts/runs
