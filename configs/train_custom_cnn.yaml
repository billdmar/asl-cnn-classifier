# Training configuration — custom from-scratch CNN.
# CLI flags (see src/train.py) override any value here.

# Data
data_dir: data/asl_alphabet_train/asl_alphabet_train  # full Kaggle layout
image_size: 128
train_frac: 0.70
val_frac: 0.15
test_frac: 0.15

# Model
arch: custom_cnn          # custom_cnn | mobilenet_v2 | resnet18
num_classes: 29
pretrained: false

# Optimization
batch_size: 64
num_epochs: 40
learning_rate: 0.001
weight_decay: 0.0001
optimizer: adamw          # adamw | sgd
lr_scheduler: cosine      # cosine | plateau
warmup_epochs: 0          # only used by transfer-learning configs

# Training behavior
seed: 42
num_workers: 4
amp: false                # auto-disabled on non-CUDA devices
early_stopping_patience: 10
device: auto              # auto | cpu | cuda | mps

# Output
checkpoint_dir: artifacts/checkpoints
tensorboard_dir: artifacts/runs
