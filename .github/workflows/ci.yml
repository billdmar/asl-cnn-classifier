name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -r requirements-dev.txt

      - name: Lint (ruff + black)
        run: |
          .venv/bin/python -m ruff check src tests
          .venv/bin/python -m black --check src tests

      - name: Type check (mypy gate)
        run: .venv/bin/python -m mypy src

      - name: Sample train (sanity check on committed fixture)
        run: .venv/bin/python -m src.train --config configs/train_custom_cnn.yaml --data_dir data/sample --num_epochs 2 --device cpu

      - name: Evaluate
        run: .venv/bin/python -m src.eval --checkpoint artifacts/checkpoints/best_model.pth --data_dir data/sample --device cpu

      - name: Headless inference smoke test
        run: .venv/bin/python -m src.infer_camera --source data/sample/A/0.png --device cpu

      - name: Tests with coverage gate
        run: .venv/bin/python -m pytest -q --cov=src --cov-report=term-missing --cov-fail-under=80

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Build CPU image
        run: docker build -t asl-cnn-classifier .

      - name: Run headless inference inside the container
        run: |
          docker run --rm asl-cnn-classifier \
            python -m src.infer_camera --source data/sample/A/0.png --device cpu

  web:
    # In-browser ASL classifier site (web/). Enforces TS strict, lint, unit +
    # cross-language parity tests, a clean production build, and E2E.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Type check (strict)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + cross-language parity tests
        run: npm test

      - name: Production build (static export)
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Lighthouse (perf + a11y budget, >=90)
        run: npm run lighthouse
